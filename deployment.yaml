apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment   # 🔥 MUST NOT BE EMPTY
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: static-web-app
        ports:
        - containerPort: 80