apiVersion: apps/v1
kind: Deployment
metadata:
name: java-app
spec:
replicas: 2
selector:
matchLabels:
app: java-app
template:
metadata:
labels:
app: java-app
spec:
containers:
- name: java-app
image: manojkumar2023/java-app:latest
ports:
- containerPort: 8087
---
apiVersion: v1
kind: Service
metadata:
name: java-service
spec:
type: NodePort
selector:
app: java-app
ports:
- port: 83
targetPort: 8087
nodePort: 30008